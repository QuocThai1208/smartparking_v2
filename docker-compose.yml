version: '3.8'

name: smart_parking_v2
services:
  redis:
    image: redis:7.2-alpine
    container_name: smart_parking_redis
    hostname: redis
    restart: always
    ports:
      - '6379:6379'
  db:
    image: mysql:8.0.36-debian
    container_name: smart_parking_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
    ports:
      - "3309:3306"
    volumes:
      - db_data:/var/lib/mysql
  celery_worker:
    build: .
    container_name: smart_parking_worker
    command: celery -A core worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: always
  backend:
    build: .
    container_name: smart_parking_backend
    restart: always
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  db_data: